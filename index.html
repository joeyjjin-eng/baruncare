<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>바른케어플러스</title>
<style>
@font-face{font-family:'Pretendard';font-weight:400;src:url('./fonts/Pretendard-Regular.woff2')format('woff2')}
@font-face{font-family:'Pretendard';font-weight:500;src:url('./fonts/Pretendard-Medium.woff2')format('woff2')}
@font-face{font-family:'Pretendard';font-weight:600;src:url('./fonts/Pretendard-SemiBold.woff2')format('woff2')}
@font-face{font-family:'Pretendard';font-weight:700;src:url('./fonts/Pretendard-Bold.woff2')format('woff2')}

:root{
  --coral:#EF7F4E;
  --coral-dark:#d96a35;
  --coral-bg:#fff6f2;
  --black:#111111;
  --gray-900:#222;
  --gray-600:#626262;
  --gray-400:#ADADAD;
  --gray-200:#E8E8E8;
  --gray-100:#F5F5F5;
  --white:#FFFFFF;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
  --radius-pill:100px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#D8D8D8;font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
button{font-family:'Pretendard',sans-serif;cursor:pointer;border:none;background:none}
input,select{font-family:'Pretendard',sans-serif}

#root{display:flex;justify-content:center;align-items:flex-start;min-height:100vh}

.shell{
  position:relative;
  width:100%;max-width:430px;height:100vh;
  background:var(--white);
  display:flex;flex-direction:column;overflow:hidden;
}
@media(min-width:430px){
  .shell{box-shadow:0 0 60px rgba(0,0,0,.18);height:100vh}
}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--white);
  display:flex;align-items:center;justify-content:center;
  padding:14px 20px;height:64px;flex-shrink:0;
  border-bottom:1px solid var(--gray-200);
}
.hdr-logo{height:32px;object-fit:contain}
.hdr-left{position:absolute;left:16px;display:flex;align-items:center}
.hdr-right{position:absolute;right:16px;display:flex;align-items:center}
.icon-btn{padding:6px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .12s}
.icon-btn:active{background:var(--gray-100)}
.back-btn{display:flex;align-items:center;gap:2px;font-size:16px;color:var(--gray-600);padding:4px 6px;border-radius:8px;transition:background .12s}
.back-btn:active{background:var(--gray-100)}

/* ── Progress bar ── */
.progress-wrap{display:flex;gap:6px;padding:14px 24px 0;flex-shrink:0}
.progress-seg{
  flex:1;height:4px;border-radius:var(--radius-pill);background:var(--gray-200);
  transition:background .3s;overflow:hidden;
}
.progress-seg.done{background:var(--accent,#11B3A8)}
.progress-seg.active{background:var(--accent,#11B3A8);position:relative}

/* ── Scrollable content ── */
.content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ── Bottom CTA ── */
.cta-wrap{padding:16px 20px 28px;flex-shrink:0}
.cta{
  width:100%;background:var(--btn-coral,#F08457);color:var(--white);
  font-size:18px;font-weight:700;letter-spacing:-.3px;
  padding:18px;border-radius:var(--radius-pill);
  transition:background .15s,transform .1s;
}
.cta:active{transform:scale(.98)}
.cta:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;transform:none}

/* ── HOME ── */
.home-bg{background:#f6f6f6}
.home-top{background:#fff;padding:28px 24px 24px;text-align:center}
.home-headline{font-size:26px;font-weight:700;color:#111;line-height:1.44;letter-spacing:-.6px}
.home-svc-btn{
  display:inline-flex;align-items:center;gap:8px;margin-top:18px;
  font-family:'Pretendard',sans-serif;font-size:16px;font-weight:400;color:#111;
  background:none;border:none;cursor:pointer;padding:0;
}
.home-svc-arrow{
  width:28px;height:28px;border-radius:999px;
  background:linear-gradient(#F08457 0%,#E9C16C 100%);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
/* Main card */
.home-main-card{
  margin:12px 18px 10px;background:#ffffff;border-radius:12px;
  overflow:hidden;cursor:pointer;
}
.home-main-card-top{padding:20px 18px 0;position:relative}
.home-main-card-text{font-size:16px;color:#232323;line-height:1.55;white-space:pre-line}
.home-share-icon{position:absolute;top:20px;right:18px}
.home-illustration{width:100%;display:block;margin-top:4px}
.home-find-btn{
  margin:0 18px 18px;width:calc(100% - 36px);
  background:var(--btn-coral,#F08457);color:#fff;
  font-family:'Pretendard',sans-serif;font-size:18px;font-weight:700;
  border:none;border-radius:999px;padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:background .15s;
}
.home-find-btn:active{background:#0d9e93}
/* Mini service cards */
.home-mini-cards{display:flex;gap:10px;margin:0 18px 10px}
.home-mini-card{
  flex:1;background:#f6f6f6;border-radius:12px;padding:18px 14px 16px;
  cursor:pointer;transition:background .12s;
}
.home-mini-card:active{background:#fff}
.home-mini-icon{width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.home-mini-sub{font-size:13px;color:#232323;line-height:1.38;margin-bottom:8px;white-space:pre-line}
.home-mini-title{font-size:18px;font-weight:700;color:#111}
/* Info section */
.home-info-label{padding:10px 18px 8px;font-size:18px;font-weight:700;color:#111}
.home-info-card{margin:0 16px 10px;background:#fff;border-radius:12px;overflow:hidden}
.home-info-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;cursor:pointer;
}
.home-info-divider{height:1px;border:none;border-top:1px dashed #CCC;margin:0 20px}
.home-info-icon-wrap{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;
}
.home-info-text{font-size:16px;color:#111;flex:1}
/* Kakao card */
.home-kakao{
  margin:20px 16px 48px;background:#FFFBE0;border:none;border-radius:12px;
  padding:18px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;text-decoration:none;color:inherit;
}
.home-kakao:active{background:#FFF6BC}
.home-kakao-left{display:flex;align-items:center;gap:12px}
.home-kakao-icon{width:46px;height:46px;display:flex;align-items:center;justify-content:center}
.home-kakao-label{font-size:16px;font-weight:400;color:#111}
/* Footer */
.home-footer{background:#565656;padding:42px 24px 44px;text-align:center}
.home-footer-logo{height:24px;margin-bottom:16px;filter:brightness(5)}
.home-footer-text{font-size:13px;color:#bababa;line-height:1.4}
.home-footer-copy{font-size:13px;color:#989898;margin-top:10px}

/* ── FIND INTRO ── */
.fi-hero{padding:32px 24px 16px;display:flex;flex-direction:column;align-items:center;text-align:center}
.fi-illust-wrap{
  width:100%;max-width:150px;display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
}
.fi-illust-wrap svg,.fi-illust-wrap img{width:100%;height:auto;display:block}
.fi-title{font-size:22px;font-weight:700;color:#111;line-height:1.5;letter-spacing:-.5px}
.fi-section-title{padding:8px 24px 14px;font-size:18px;font-weight:700;color:#111;letter-spacing:-.3px}
.fi-steps{padding:0 24px 8px;display:flex;flex-direction:column;gap:18px}
.fi-step{display:flex;align-items:center;gap:14px}
.fi-step-icon{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.fi-step-text strong{display:block;font-size:16px;font-weight:700;color:#111;margin-bottom:3px;letter-spacing:-.2px}
.fi-step-text span{font-size:13px;color:#888;line-height:1.4}
.fi-info{
  margin:24px 24px 28px;padding:16px 18px;
  background:#FFF4F0;border:1px solid #FFE0D2;border-radius:14px;
  font-size:13px;color:#7a7a7a;line-height:1.65;text-align:center;
}

/* ── REG INTRO ── */
.ri-content{background:#fff}
.ri-illust-wrap{
  width:150px;height:150px;border-radius:50%;overflow:hidden;
  margin:32px auto 16px;display:flex;align-items:center;justify-content:center;
}
.ri-illust-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.ri-title{
  padding:0 24px;font-size:22px;font-weight:700;color:#111;
  line-height:1.45;letter-spacing:-.5px;
}
.ri-bullets{padding:16px 24px 0;display:flex;flex-direction:column;gap:8px}
.ri-bullet{font-size:16px;color:#333;line-height:1.55;letter-spacing:-.2px;white-space:pre-line}
.ri-info{
  margin:18px 24px 22px;padding:14px 16px;
  background:#F5F5F5;border-radius:12px;
  font-size:13px;color:#555;line-height:1.65;letter-spacing:-.2px;
}
.ri-feature-list{
  margin:0 24px 12px;background:rgba(240,132,87,.08);
  border-radius:14px;display:flex;flex-direction:column;
}
.ri-feature{
  display:flex;align-items:center;gap:14px;padding:16px 18px;
  position:relative;
}
.ri-feature + .ri-feature::before{
  content:'';position:absolute;top:0;left:18px;right:18px;
  height:1px;background:rgba(240,132,87,.18);
}
.ri-feature-icon{
  width:36px; height:36px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ri-feature-icon img{width:100%;height:100%;object-fit:contain;display:block}
.ri-feature-text{font-size:16px;color:#333;line-height:1.55;letter-spacing:-.2px;white-space:pre-line}

/* ── ABOUT ── */
.about-hero-img{display:block;width:100%;height:auto}
.about-section{padding:52px 28px 52px;background:#fff}
.about-section--gray{background:#F2F2F2}
.about-section-title{font-size:22px;font-weight:700;color:#111;letter-spacing:-.4px;line-height:1.4}
.about-section-sub{font-size:16px;color:#444;margin-top:14px;line-height:1.5;white-space:pre-line}
.about-services-list{margin-top:28px;display:flex;flex-direction:column;gap:20px}
.about-service-row{display:flex;align-items:center;gap:14px}
.about-service-img{width:62px;height:62px;flex-shrink:0;object-fit:contain;display:block}
.about-service-text{font-size:16px;color:#111;letter-spacing:-.2px;line-height:1.45}
.about-trust-list{margin-top:24px;display:flex;flex-direction:column;gap:10px}
.about-trust-pill{
  background:#fff;border-radius:999px;padding:11px 20px;
  display:inline-flex;align-items:center;gap:7px;
  font-size:16px;color:#222;width:fit-content;letter-spacing:-.2px;
}
.about-trust-img{width:22px;height:22px;flex-shrink:0;object-fit:contain;display:block}
.about-reg-head{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.about-reg-card{
  background:#F7F7F7;border-radius:14px;padding:6px 22px;
}
.about-reg-item{display:flex;align-items:center;gap:10px;font-size:16px;color:#222;letter-spacing:-.2px;padding:14px 0}
.about-reg-item + .about-reg-item{border-top:1px dashed #D5D5D5}
.about-reg-closing{margin-top:24px;text-align:center;font-size:16px;color:#444;line-height:1.55}
.about-contact{background:#FFF6BC;padding:32px 28px 32px}
.about-contact-title{font-size:16px;font-weight:400;color:#3a2a00;line-height:1.35;margin-bottom:14px}
.about-contact-btn{
  background:#FAE100;border:none;border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  width:100%;cursor:pointer;text-decoration:none;color:inherit;
}
.about-contact-btn-left{display:flex;align-items:center;gap:10px;font-size:16px;color:#111}

/* ── CLAIM INTRO ── */
.ci-callout{
  margin:18px 24px 16px;padding:20px 22px;
  background:rgba(240,132,87,.08);border-radius:14px;
}
.ci-callout-title{
  font-size:18px;font-weight:700;color:#111;letter-spacing:-.3px;
  line-height:1.5;margin-bottom:14px;
}
.ci-callout-list{
  list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;
}
.ci-callout-list li{
  position:relative;padding-left:14px;
  font-size:16px;color:#444;line-height:1.35;letter-spacing:-.2px;
}
.ci-callout-list li::before{
  content:'•';position:absolute;left:2px;top:0;color:#F08457;font-weight:700;
}

/* ── REVIEW ── */
.review-content{padding:0 0 8px;background:#F6F6F6}
.review-section{
  margin:0 18px 10px;background:#fff;border-radius:12px;
  padding:18px 20px;
}
.review-section-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;
}
.review-section-title{font-size:18px;font-weight:700;color:#111;letter-spacing:-.2px}
.review-edit{
  font-size:13px;color:#888;background:none;border:1px solid #E0E0E0;
  border-radius:14px;padding:4px 10px;cursor:pointer;font-family:'Pretendard',sans-serif;
}
.review-edit:active{background:#f5f5f5}
.review-row{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;padding:9px 0;
}
.review-row + .review-row{border-top:1px dashed #EEE}
.review-label{font-size:13px;color:#888;flex-shrink:0;width:84px;line-height:1.55;padding-top:1px}
.review-value{font-size:16px;color:#111;text-align:right;flex:1;line-height:1.55;word-break:break-all;white-space:pre-line}
.review-value.empty{color:#ccc}
.review-tag-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;flex:1}
.review-tag{
  display:inline-block;background:#F0FFFE;color:#0a7a74;
  font-size:13px;font-weight:500;padding:4px 10px;border-radius:20px;
  letter-spacing:-.2px;
}

/* ── FORM ── */
.section-label{padding:36px 24px 16px;font-size:22px;font-weight:700;color:var(--black);letter-spacing:-.5px}
.section-label:has(+ .section-sub){padding-bottom:4px}
.section-sub{padding:4px 24px 16px;font-size:13px;color:var(--gray-600);line-height:1.5}
.field-group{padding:0 24px 18px}
.field-label{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:8px;display:block;letter-spacing:.1px}
.field-input{
  width:100%;height:52px;background:var(--gray-100);border:1.5px solid transparent;
  border-radius:var(--radius-sm);padding:0 16px;font-size:16px;color:var(--black);
  outline:none;transition:all .2s;
}
.field-input:focus{border-color:#F08457;box-shadow:none}
.field-input::placeholder{color:var(--gray-400)}
.field-row{display:flex;gap:10px}
.field-row .field-input{flex:1;min-width:0}

/* ── Toggle ── */
.toggle-wrap{display:flex;gap:8px;padding:0 24px 20px}
.toggle-btn{
  flex:1;height:48px;border-radius:var(--radius-sm);border:1.5px solid var(--gray-200);
  font-size:16px;font-weight:500;color:var(--gray-600);transition:all .15s;
}
.toggle-btn.on{border-color:var(--accent,#11B3A8);background:var(--coral-bg);color:var(--accent,#11B3A8);font-weight:700}

/* ── Insurance grid ── */
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 24px 20px}
.ins-item{
  border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);padding:14px 6px;
  text-align:center;font-size:13px;font-weight:500;color:var(--gray-600);
  cursor:pointer;transition:all .15s;background:var(--white);
}
.ins-item:active{background:var(--gray-100)}
.ins-item.sel{background:var(--accent,#11B3A8);border-color:var(--accent,#11B3A8);color:var(--white);font-weight:700}

/* ── Date / Calendar input ── */
.date-pair{display:flex;align-items:center;gap:8px}
.date-sep{font-size:13px;color:var(--gray-400);flex-shrink:0}

/* ── Done screen ── */
.done-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;gap:12px;
}
.done-circle{
  width:88px;height:88px;border-radius:50%;background:var(--accent,#11B3A8);
  display:flex;align-items:center;justify-content:center;margin-bottom:8px;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.done-check{font-size:40px;color:white}
.done-title{font-size:26px;font-weight:700;color:var(--black);letter-spacing:-.5px}
.done-desc{font-size:16px;color:var(--gray-600);line-height:1.65;white-space:pre-line}
.done-kakao{
  width:100%;border-radius:var(--radius-md);background:#FAE100;padding:18px 20px;
  display:flex;align-items:center;gap:14px;text-align:left;margin-top:12px;
}
.done-kakao-icon{
  width:44px;height:44px;background:rgba(0,0,0,.1);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}

.done-kakao-text strong{font-size:16px;font-weight:700;color:#3a1a00;display:block;margin-bottom:2px}
.done-kakao-text span{font-size:13px;color:#6a3a00;line-height:1.4}

/* ── GNB ── */
.gnb-overlay{position:absolute;inset:0;z-index:200}
.gnb-back{position:absolute;inset:0;background:rgba(0,0,0,.45);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.gnb-panel{
  position:absolute;top:0;right:0;width:75%;max-width:300px;height:100%;
  background:var(--white);animation:slidePanel .25s cubic-bezier(.25,.46,.45,.94);
  display:flex;flex-direction:column;
}
@keyframes slidePanel{from{transform:translateX(100%)}to{transform:translateX(0)}}
.gnb-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;height:64px;border-bottom:1px solid var(--gray-200)}
.gnb-item{
  padding:20px 24px;font-size:18px;font-weight:700;color:var(--black);
  border-bottom:1px solid var(--gray-200);display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;transition:background .12s;
}
.gnb-item:active{background:var(--gray-100)}
.gnb-item.active-item{color:var(--coral)}

/* ── Footer ── */
.footer{background:var(--gray-100);padding:28px 24px 44px;text-align:center}
.footer img{height:24px;opacity:.4;margin-bottom:12px}
.footer-text{font-size:13px;color:var(--gray-600);line-height:1.8}
.footer-copy{font-size:13px;color:var(--gray-400);margin-top:10px}

/* ── Transitions ── */
.fwd{animation:fwd .22s ease both}
.bwd{animation:bwd .22s ease both}
@keyframes fwd{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes bwd{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}

/* Progressive field reveal */
.prog-reveal{animation:progReveal .35s cubic-bezier(.25,.46,.45,.94) both}
@keyframes progReveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.field-input[disabled]{background:#f9f9f9;color:#aaa}

/* ── Terms Agreement Modal ── */
.terms-overlay{
  position:absolute;inset:0;z-index:300;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.terms-back{
  position:absolute;inset:0;background:rgba(0,0,0,.45);animation:fadeIn .2s;
}
.terms-sheet{
  position:relative;background:#fff;border-radius:16px 16px 0 0;
  display:flex;flex-direction:column;
  animation:slideUp .25s cubic-bezier(.25,.46,.45,.94);
  max-height:80%;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.terms-body{padding:20px 20px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.terms-all{
  width:100%;background:#fff;border:1.5px solid #E0E0E0;border-radius:10px;
  padding:18px 18px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .15s;
}
.terms-all.on{border-color:#22B07D}
.terms-all-text{font-size:16px;font-weight:700;color:#111;letter-spacing:-.2px}
.terms-list{padding:8px 4px 0;display:flex;flex-direction:column}
.terms-row{
  display:flex;align-items:center;gap:12px;padding:14px 4px;cursor:pointer;
}
.terms-row-text{flex:1;font-size:15px;color:#111;letter-spacing:-.2px}
.terms-row-text .req{color:#888;font-size:13px;margin-left:4px;font-weight:400}
.terms-chevron{flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:6px 4px 6px 12px;margin:-6px -4px -6px -8px;border-radius:8px;color:inherit;text-decoration:none;transition:background .12s}

function RegStep2({ data, onChange, onNext }) {
  /* Progressive reveal */
  const [revealed, setReveal] = useState(['name']);
  const contentRef = useRef(null);

  const reveal = (field) => {
    setReveal(prev => prev.includes(field) ? prev : [...prev, field]);
    /* scroll to bottom after reveal */
    setTimeout(() => {
      if (contentRef.current) {
        contentRef.current.scrollTo({ top: contentRef.current.scrollHeight, behavior: 'smooth' });
      }
    }, 80);
  };

  const has = (f) => revealed.includes(f);

  const allDone = data.phone && data.gender && data.dob && (data.city || data.district);

  const handleNext = () => {
    if (!has('gender') && data.name && data.name.trim().length >= 2) { reveal('gender'); return; }
    if (!has('phone') && data.gender) { reveal('phone'); return; }
    if (!has('dob') && data.phone && data.phone.length >= 10) { reveal('dob'); return; }
    if (!has('address') && data.dob && data.dob.length >= 8) { reveal('address'); return; }
    if (allDone) { onNext(); }
  };

  const canProceed = () => {
    if (!has('gender')) return !!(data.name && data.name.trim().length >= 2);
    if (!has('phone')) return !!data.gender;
    if (!has('dob')) return !!(data.phone && data.phone.length >= 10);
    if (!has('address')) return !!(data.dob && data.dob.length >= 8);
    return !!allDone;
  };

  const onEnter = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleNext(); } };

  return (
    <>
      <Progress total={3} current={1} />
      <div className="content" ref={contentRef} style={{ overflowY: 'auto' }}>
        <div className="section-label">간병인 정보</div>
        <div className="section-sub">정보를 입력하면 다음 항목이 나타납니다</div>

        {/* 이름 */}
        <div className="field-group prog-field">
          <label className="field-label">이름</label>
          <input
            className="field-input"
            placeholder="성함을 입력해주세요"
            value={data.name || ''}
            onChange={e => onChange('name', filterName(e.target.value))}
            onKeyDown={onEnter}
          />
        </div>

        {/* 성별 */}
        {has('gender') && (
          <div className="field-group prog-field prog-reveal">
            <label className="field-label">성별</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['남성', '여성'].map(g => (
                <button key={g}
                  className={`toggle-btn ${data.gender === g ? 'on' : ''}`}
                  style={{ flex: 1 }}
                  onClick={() => { onChange('gender', g); reveal('phone'); }}>
                  {g}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* 연락처 */}
        {has('phone') && (
          <div className="field-group prog-field prog-reveal">
            <label className="field-label">연락처</label>
            <input
              className="field-input"
              type="tel"
              inputMode="numeric"
              maxLength={11}
              placeholder="01000000000"
              autoFocus
              value={data.phone || ''}
              onChange={e => onChange('phone', filterPhone(e.target.value))}
              onKeyDown={onEnter}
            />
          </div>
        )}

        {/* 생년월일 */}
        {has('dob') && (
          <div className="field-group prog-field prog-reveal">
            <label className="field-label">생년월일</label>
            <input
              className="field-input"
              type="tel"
              inputMode="numeric"
              maxLength={8}
              placeholder="예) 19850615"
              autoFocus
              value={data.dob || ''}
              onChange={e => onChange('dob', filterDob(e.target.value))}
              onKeyDown={onEnter}
            />
          </div>
        )}

        {/* 주소 */}
        {has('address') && (
          <div className="field-group prog-field prog-reveal">
            <label className="field-label">주소</label>
            <div className="field-row">

const MINUTES_10 = ['00', '10', '20', '30', '40', '50'];

function TimeSelect10({ value, onChange }) {
  const [h, m] = (value || '').split(':');
  const setH = (nh) => onChange(`${nh}:${m || '00'}`);
  const setM = (nm) => onChange(`${h || '00'}:${nm}`);
  return (
    <div style={{ display: 'flex', gap: 8, flex: 1 }}>
      <select className="field-input" value={h || ''} onChange={e => setH(e.target.value)} style={{ flex: 1 }}>
        <option value="" disabled>시</option>
        {HOURS_24.map(hh => <option key={hh} value={hh}>{hh}시</option>)}
      </select>
      <select className="field-input" value={m || ''} onChange={e => setM(e.target.value)} style={{ flex: 1 }}>
        <option value="" disabled>분</option>
        {MINUTES_10.map(mm => <option key={mm} value={mm}>{mm}분</option>)}
      </select>
    </div>
  );
}

      <div onClick={onChange} style={{

        flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'background .12s', borderRadius: "4px"

  { key: 'thirdparty', label: '개인정보 제3자 제공 동의', required: true, link: 'https://www.notion.so/3-3597b6dfe2838079bd2af4cd3cf60a30?pvs=21' }
];

const REG_TERMS = [
  { key: 'tos', label: '서비스 이용약관 동의', required: true, link: 'https://www.notion.so/3597b6dfe283809fa905dc34a18b5955?pvs=21' },
  { key: 'privacy', label: '개인정보 수집 및 이용 동의', required: true, link: 'https://www.notion.so/3597b6dfe2838040a989e43f20fd08d5?pvs=21' },
  { key: 'thirdparty', label: '개인정보 제3자 제공 동의', required: true, link: 'https://www.notion.so/3-3597b6dfe28380b58c92cd6f64fe88a5?pvs=21' }
];

const CLAIM_TERMS = [
  { key: 'tos', label: '서비스 이용약관 동의', required: true, link: 'https://www.notion.so/3597b6dfe2838084a632f7a29f631d82?pvs=21' },
  { key: 'privacy', label: '개인정보 수집 및 이용 동의', required: true, link: 'https://www.notion.so/3597b6dfe283803a89c9dd55fe7ff8ec?pvs=21' },
  { key: 'sensitive', label: '민감정보 수집 및 이용 동의', required: true, link: 'https://www.notion.so/3597b6dfe28380f7a5a3e39f0966e34f?pvs=21' },
  { key: 'thirdparty', label: '개인정보 제3자 제공 동의', required: true, link: 'https://www.notion.so/3-3597b6dfe2838094b0c3ef3ca99fa9f0?pvs=21' }
];

const IcoTermsCheck = ({ on }) => (
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
    <path d="M5 11.5l4 4 8-9" stroke={on ? '#22B07D' : '#C8C8C8'} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
  </svg>
);

const IcoChevronR = () => (
  <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <path d="M7 4l5 5-5 5" stroke="#9A9A9A" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
  </svg>
);

function TermsModal({ terms, onBack, onConfirm }) {
  const [agreed, setAgreed] = useState({});
  const allOn = terms.every((t) => agreed[t.key]);
  const allRequiredOn = terms.filter((t) => t.required).every((t) => agreed[t.key]);
  const toggleOne = (key) => setAgreed((a) => ({ ...a, [key]: !a[key] }));
  const toggleAll = () => {
    if (allOn) setAgreed({});
    else setAgreed(Object.fromEntries(terms.map((t) => [t.key, true])));
  };
  return (
    <div className="terms-overlay">
      <div className="terms-back" onClick={onBack} />
      <div className="terms-sheet">
        <div className="terms-body">
          <button className={`terms-all ${allOn ? 'on' : ''}`} onClick={toggleAll}>
            <IcoTermsCheck on={allOn} />
            <span className="terms-all-text">약관 전체동의</span>
          </button>
          <div className="terms-list">
            {terms.map((t) => (
              <div key={t.key} className="terms-row" onClick={() => toggleOne(t.key)}>
                <IcoTermsCheck on={!!agreed[t.key]} />
                <span className="terms-row-text">
                  {t.label}<span className="req">{t.required ? '[필수]' : '[선택]'}</span>
                </span>
                {t.link ?
                <a
                  className="terms-chevron"
                  href={t.link}
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label={`${t.label} 상세보기`}
                  onClick={(e) => e.stopPropagation()}>
                  <IcoChevronR />
                </a> :
                <span className="terms-chevron"><IcoChevronR /></span>
                }
              </div>
            ))}
          </div>
        </div>
        <div className="terms-cta-wrap">
          <button className="terms-back-btn" onClick={onBack}>뒤로</button>
          <button className="terms-next-btn" onClick={onConfirm} disabled={!allRequiredOn}>다음</button>
        </div>
      </div>
    </div>
  );
}

/* ──────────── APP ──────────── */
function App() {
  const [screen, setScreen] = useState('home');
  const [step, setStep] = useState(0);
  const [dir, setDir] = useState('fwd');
  const [gnb, setGnb] = useState(false);
  const [isEditingReview, setIsEditingReview] = useState(false);
  const [findTermsOpen, setFindTermsOpen] = useState(false);
  const [regTermsOpen, setRegTermsOpen] = useState(false);
  const [claimTermsOpen, setClaimTermsOpen] = useState(false);

  // per-flow state
  const [findReq, setFindReq] = useState({});
  const [findPt, setFindPt] = useState({});
  const [findPlace, setFindPlace] = useState({});
  const [findWhen, setFindWhen] = useState({});
  const [findState, setFindState] = useState({});
  const [regData, setRegData] = useState({});
  const [claimCg, setClaimCg] = useState({});
  const [claimPt, setClaimPt] = useState({});
  const [claimIns, setClaimIns] = useState('');
  const [claimPer, setClaimPer] = useState({});

  const [tweaks, setTweak] = typeof useTweaks === 'function' ? useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const { accentColor, btnColor, cardRadius, pageBg, headline, darkMode } = tweaks || TWEAK_DEFAULTS;

  const go = useCallback((sc, d = 'fwd', s = 0) => {
    setDir(d);setScreen(sc);setStep(s);setIsEditingReview(false);
  }, []);
  const reviewStepIndex = { find: 6, reg: 3, claim: 4 };
  const nextStep = () => {
    setDir('fwd');
    if (isEditingReview && reviewStepIndex[screen] !== undefined) {
      setIsEditingReview(false);
      setStep(reviewStepIndex[screen]);
    } else {
      setStep((s) => s + 1);
    }
  };
  const prevStep = () => {
    if (step > 0) {setDir('bwd');setStep((s) => s - 1);} else
    go('home', 'bwd');
  };

  const patchFindReq = (k, v) => setFindReq((d) => ({ ...d, [k]: v }));
  const patchFindPt = (k, v) => setFindPt((d) => ({ ...d, [k]: v }));
  const patchFindPlace = (k, v) => setFindPlace((d) => ({ ...d, [k]: v }));
  const patchFindWhen = (k, v) => setFindWhen((d) => ({ ...d, [k]: v }));
  const patchFindState = (k, v) => setFindState((d) => ({ ...d, [k]: v }));
  const patchReg = (k, v) => setRegData((d) => ({ ...d, [k]: v }));
  const patchClaimCg = (k, v) => setClaimCg((d) => ({ ...d, [k]: v }));
  const patchClaimPt = (k, v) => setClaimPt((d) => ({ ...d, [k]: v }));
  const patchClaimPer = (k, v) => setClaimPer((d) => ({ ...d, [k]: v }));

  const animKey = `${screen}-${step}`;

  const FIND_COLOR = accentColor || '#11B3A8';
  const REG_COLOR = '#5CB85C';
  const CLAIM_COLOR = '#E8875D';

  const renderBody = () => {
    /* HOME */
    if (screen === 'home') return <HomeScreen
      tweaks={tweaks}
      onStart={() => go('find-intro')}
      onReg={() => go('reg-intro')}
      onClaim={() => go('claim-intro')}
      onProcess={() => go('process')}
      onDocs={() => go('docs')}
      onAbout={() => go('about')} />;

    /* INFO PAGES */
    if (screen === 'about') return <AboutScreen />;
    if (screen === 'process') return <ProcessScreen onConfirm={() => go('home', 'bwd')} />;
    if (screen === 'docs') return <DocsScreen onConfirm={() => go('home', 'bwd')} />;

    /* ── FIND FLOW ── */
    if (screen === 'find-intro') return <FindIntroScreen onNext={() => go('find')} />;

    if (screen === 'find') {
      if (step === 0) return <FindStep1 data={findReq} onChange={patchFindReq} onNext={nextStep} />;
      if (step === 1) return <FindStep2 data={findPt} onChange={patchFindPt} onNext={nextStep} />;
      if (step === 2) return <FindStep3 data={findPlace} onChange={patchFindPlace} onNext={nextStep} />;
      if (step === 3) return <FindStep4 data={findWhen} onChange={patchFindWhen} onNext={nextStep} />;
      if (step === 4) return <FindStep5 data={findState} onChange={patchFindState} onNext={nextStep} />;
      if (step === 5) return <FindStep6 data={findState} onChange={patchFindState} onNext={nextStep} />;
      if (step === 6) return <FindReviewScreen
        findReq={findReq} findPt={findPt} findPlace={findPlace} findWhen={findWhen} findState={findState}
        onSubmit={() => setFindTermsOpen(true)}
        onEdit={(s) => {setIsEditingReview(true);setDir('bwd');setStep(s);}} />;
    }
    if (screen === 'find-done') return <FlowDoneScreen
      title="신청완료!"
      desc={'간병인이 매칭되면 알림톡으로\n알려드립니다.'}
      kakaoText="매칭 완료 시 카카오톡으로 연락드립니다"
      ctaBg={FIND_COLOR}
      onHome={() => go('home', 'bwd')} />;

    /* ── REG FLOW ── */
    if (screen === 'reg-intro') return <RegIntroScreen onNext={() => go('reg')} />;

    if (screen === 'reg') {
      if (step === 0) return <RegStep1 data={regData} onChange={patchReg} onNext={nextStep} />;
      if (step === 1) return <RegStep2 data={regData} onChange={patchReg} onNext={nextStep} />;
      if (step === 2) return <RegStep3 data={regData} onChange={patchReg} onNext={nextStep} />;
      if (step === 3) return <RegReviewScreen
        data={regData}
        onSubmit={() => setRegTermsOpen(true)}
        onEdit={(s) => {setIsEditingReview(true);setDir('bwd');setStep(s);}} />;
    }
    if (screen === 'reg-done') return <FlowDoneScreen
      title="신청완료!"
      desc={'진행상황을 알림톡으로 알려드립니다.'}
      kakaoText="처리 완료 후 카카오톡으로 연락드립니다"
      ctaBg={REG_COLOR}
      onHome={() => go('home', 'bwd')} />;

    /* ── CLAIM FLOW ── */
    if (screen === 'claim-intro') return <ClaimIntroScreen
      color={CLAIM_COLOR}
      onNext={() => go('claim')}
      onProcess={() => go('process')}
      onDocs={() => go('docs')} />;

    if (screen === 'claim') {
      if (step === 0) return <ClaimStep1 data={claimCg} onChange={patchClaimCg} onNext={nextStep} />;
      if (step === 1) return <ClaimStep2 data={claimPt} onChange={patchClaimPt} onNext={nextStep} />;
      if (step === 2) return <ClaimStep3 insurer={claimIns} onSelect={setClaimIns} onNext={nextStep} />;
      if (step === 3) return <ClaimStep4 data={claimPer} onChange={patchClaimPer} onNext={nextStep} />;
      if (step === 4) return <ClaimReviewScreen
        claimCg={claimCg} claimPt={claimPt} claimIns={claimIns} claimPer={claimPer}
        onSubmit={() => setClaimTermsOpen(true)}
        onEdit={(s) => {setIsEditingReview(true);setDir('bwd');setStep(s);}} />;
    }
    if (screen === 'claim-done') return <FlowDoneScreen
      title="청구도우미 신청완료!"
      desc={'청구도우미가 배정되면 카톡을 드립니다.\n첨부서류는 배정된 후 카카오톡을 통해 제출해 주시면 됩니다.'}
      kakaoText="배정 완료 시 카카오톡으로 연락드립니다"
      ctaBg={CLAIM_COLOR}
      onHome={() => go('home', 'bwd')} />;
  };

  const shellStyle = {
    '--accent': accentColor,
    '--btn-coral': btnColor,
    '--card-r': cardRadius + 'px',
    '--page-bg': pageBg
  };

  return (
    <div className="shell" style={shellStyle}>
      <Header onMenu={() => setGnb(true)} onBack={prevStep} onHome={() => go('home', 'bwd')} showBack={screen !== 'home'} />
      <div key={animKey} className={dir} style={{ display: 'contents' }}>
        {renderBody()}
      </div>
      <GNB open={gnb} onClose={() => setGnb(false)} onGo={(key) => {go(key);}} screen={screen} />
      {findTermsOpen &&
        <TermsModal
          terms={FIND_TERMS}
          onBack={() => setFindTermsOpen(false)}
          onConfirm={() => {setFindTermsOpen(false);go('find-done');}} />
      }
      {regTermsOpen &&
        <TermsModal
          terms={REG_TERMS}
          onBack={() => setRegTermsOpen(false)}
          onConfirm={() => {setRegTermsOpen(false);go('reg-done');}} />
      }
      {claimTermsOpen &&
        <TermsModal
          terms={CLAIM_TERMS}
          onBack={() => setClaimTermsOpen(false)}
          onConfirm={() => {setClaimTermsOpen(false);go('claim-done');}} />
      }
      {typeof TweaksPanel !== 'undefined' &&
      <TweaksPanel>
          <TweakSection label="브랜드 컬러">
            <TweakColor label="포인트 컬러" id="accentColor" value={accentColor} onChange={(v) => setTweak('accentColor', v)} />
            <TweakColor label="버튼 컬러" id="btnColor" value={btnColor} onChange={(v) => setTweak('btnColor', v)} />
            <TweakColor label="배경색" id="pageBg" value={pageBg} onChange={(v) => setTweak('pageBg', v)} />
          </TweakSection>
          <TweakSection label="레이아웃">
            <TweakSlider label="카드 모서리" id="cardRadius" value={cardRadius} min={0} max={24} step={2} onChange={(v) => setTweak('cardRadius', v)} />
          </TweakSection>
          <TweakSection label="콘텐츠">
            <TweakText label="헤드라인" id="headline" value={headline} onChange={(v) => setTweak('headline', v)} />
            <TweakToggle label="다크 모드" id="darkMode" value={darkMode} onChange={(v) => setTweak('darkMode', v)} />
          </TweakSection>
        </TweaksPanel>
      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
